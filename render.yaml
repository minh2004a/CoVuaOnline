services:
  - type: web
    name: chess-online
    env: node
    plan: free
    autoDeploy: true
    healthCheckPath: /api/stats
    buildCommand: NPM_CONFIG_SCRIPT_SHELL=/bin/bash npm ci --prefix chess && NPM_CONFIG_SCRIPT_SHELL=/bin/bash npm run build --prefix chess && NPM_CONFIG_SCRIPT_SHELL=/bin/bash npm ci --prefix chess-server
    startCommand: node chess-server/server.js
    disk:
      name: chess-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CHESS_DB_PATH
        value: /var/data/chess-online.sqlite
      - key: CORS_ORIGIN
        value: "https://chess-online.onrender.com"
      - key: DB_BACKUP_ENABLED
        value: "true"
      - key: DB_BACKUP_INTERVAL_HOURS
        value: "24"
      - key: DB_BACKUP_RETENTION_DAYS
        value: "14"
      - key: DB_BACKUP_DIR
        value: "/var/data/backups"
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: FIREBASE_WEB_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_WEB_PROJECT_ID
        sync: false
      - key: FIREBASE_WEB_APP_ID
        sync: false
      - key: FIREBASE_WEB_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_WEB_MEASUREMENT_ID
        sync: false
