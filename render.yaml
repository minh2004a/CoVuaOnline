services:
  - type: web
    name: chess-online
    env: node
    plan: free
    autoDeploy: true
    healthCheckPath: /api/stats
    buildCommand: npm install --prefix chess-server
    startCommand: node chess-server/server.js
    disk:
      name: chess-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CHESS_DB_PATH
        value: /var/data/chess-online.sqlite
      - key: CORS_ORIGIN
        value: "*"
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: FIREBASE_WEB_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_WEB_PROJECT_ID
        sync: false
      - key: FIREBASE_WEB_APP_ID
        sync: false
      - key: FIREBASE_WEB_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_WEB_MEASUREMENT_ID
        sync: false
